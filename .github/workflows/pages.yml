name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate schematics
        run: python3 inverter.py
      - name: Inject commit hash into index.html
        run: |
          python3 -c "
          import os
          html = open('index.html').read()
          html = html.replace('__COMMIT_HASH__', os.environ['GITHUB_SHA'][:7])
          open('index.html', 'w').write(html)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
